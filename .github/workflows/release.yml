name: Build & Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: true
        default: 'master'
      version:
        description: 'Version for the release'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Tag version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      - name: Build release artifacts
        run: |
          chmod +x gradlew
          ./gradlew clean jar sourcesJar

      - name: Package release artifacts
        run: |
          RELEASE_DIR=taala-${{ github.event.inputs.version }}
          mkdir -p $RELEASE_DIR
          cp build/libs/taala-*.jar $RELEASE_DIR/
          cp LICENSE NOTICE $RELEASE_DIR/
          zip -r ${RELEASE_DIR}.zip $RELEASE_DIR
          tar -czvf ${RELEASE_DIR}.tar.gz $RELEASE_DIR

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: |
            taala-${{ github.event.inputs.version }}.zip
            taala-${{ github.event.inputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
